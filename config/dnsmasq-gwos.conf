# GWOS — dnsmasq para resolução de nomes internos da LAN
# Copiado para /etc/dnsmasq.d/gwos.conf pelo instalador.
#
# Arquitetura:
#   Clientes → BIND9 :53 (RPZ + internet)
#                  └── cdpni.local → dnsmasq :5353 (este arquivo)
#
# Hosts da LAN são gerenciados via: gwos dns add|update|del|list
# As entradas ficam em /etc/hosts do gateway.

# Porta não-padrão — BIND9 usa a 53
port=5353

# Escuta apenas no loopback (BIND9 encaminha para cá)
listen-address=127.0.0.1
bind-interfaces

# Não usa /etc/resolv.conf — toda resolução externa vai pelo BIND9
no-resolv
no-poll

# Domínio local padrão: nomes sem ponto resolvem como <host>.cdpni.local
domain=cdpni.local
local=/cdpni.local/

# Lê /etc/hosts para resolução de nomes locais
# (comportamento padrão do dnsmasq — explícito para clareza)
# addn-hosts=/etc/hosts

# TTL baixo para que mudanças de IP propaguem rápido nos clientes
local-ttl=60

# Não encaminhar nomes sem ponto para upstream (evita vazar nomes internos)
domain-needed
bogus-priv
