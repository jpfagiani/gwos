# ============================================================
# GWOS — Squid Proxy com SSL Bump
# /etc/squid/squid.conf
# ============================================================

# ------------------------------------------------------------
# Portas de escuta
# ------------------------------------------------------------
# Forward-proxy: clientes explícitos configuram proxy 192.168.x.x:3127
http_port 3127

# HTTP transparente (interceptado via nftables)
http_port 3128 intercept

# HTTPS transparente com SSL Bump
https_port 3129 intercept ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    cert=/etc/squid/ssl_cert/gwos-ca.crt \
    key=/etc/squid/ssl_cert/gwos-ca.key

sslcrtd_program /usr/lib/squid/security_file_certgen \
    -s /var/lib/squid/ssl_db -M 16MB
sslcrtd_children 8 startup=2 idle=2

# ------------------------------------------------------------
# SSL Bump — peek SNI → splice sites livres/whitelist → bump resto
# ------------------------------------------------------------
acl step1 at_step SslBump1

acl gwos_ips_livres_src    src "/etc/squid/conf.d/gwos_ips_livres.txt"
acl gwos_liberados_src     src "/etc/squid/conf.d/gwos_ips_liberados.txt"
acl gwos_whitelist_sni     ssl::server_name "/etc/squid/conf.d/gwos_whitelist.txt"
acl gwos_sites_livres_sni  ssl::server_name "/etc/squid/conf.d/gwos_sites_livres.txt"
acl gwos_blacklist_sni     ssl::server_name "/etc/squid/conf.d/gwos_blacklist.txt"

ssl_bump peek step1
ssl_bump splice gwos_ips_livres_src
ssl_bump splice gwos_liberados_src
ssl_bump splice gwos_whitelist_sni
ssl_bump splice gwos_sites_livres_sni
ssl_bump bump all

# ------------------------------------------------------------
# ACLs de rede
# ------------------------------------------------------------
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl rede_interna dst 10.0.0.0/8
acl rede_interna dst 172.16.0.0/12
acl gateway dst 192.168.0.0/24

acl SSL_ports  port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 21
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777
acl Safe_ports port 1025-65535

acl CONNECT method CONNECT

# ------------------------------------------------------------
# Grupos de IPs gerenciados pelo GWOS
# ------------------------------------------------------------
acl gwos_bloqueados src "/etc/squid/conf.d/gwos_ips_bloqueados.txt"
acl gwos_parciais   src "/etc/squid/conf.d/gwos_ips_parciais.txt"
acl gwos_liberados  src "/etc/squid/conf.d/gwos_ips_liberados.txt"

# ------------------------------------------------------------
# Domínios gerenciados pelo GWOS
# ------------------------------------------------------------
acl gwos_whitelist_dst    dstdomain "/etc/squid/conf.d/gwos_whitelist.txt"
acl gwos_sites_livres_dst dstdomain "/etc/squid/conf.d/gwos_sites_livres.txt"
acl gwos_blacklist_dst    dstdomain "/etc/squid/conf.d/gwos_blacklist.txt"

# ------------------------------------------------------------
# Regras de acesso — ORDEM IMPORTA
# ------------------------------------------------------------
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

http_access allow localhost manager
http_access deny manager

# Destinos internos (LAN, gateway): sempre permitir — sem restrição de grupo
http_access allow gateway
http_access allow rede_interna

# Sites liberados da whitelist e sites livres: sempre permitir
http_access allow gwos_whitelist_dst
http_access allow gwos_whitelist_sni
http_access allow gwos_sites_livres_dst
http_access allow gwos_sites_livres_sni

# IPs totalmente bloqueados: nega antes de qualquer permissão de grupo
http_access deny gwos_bloqueados

# IPs liberados (sem restrição de horário ou domínio): acesso total
http_access allow gwos_liberados

# Demais clientes da LAN: sujeitos a horários e blacklist
http_access deny gwos_blacklist_dst
http_access deny gwos_blacklist_sni
include /etc/squid/conf.d/gwos_horarios.conf

# Clientes parciais: apenas whitelist (já foi permitido acima, então nega o resto)
http_access deny gwos_parciais

# Clientes normais da LAN: acesso ao que restou
http_access allow localnet

http_access deny all

# ------------------------------------------------------------
# NAT 1:1 — tcp_outgoing_address por cliente (gerado por aplicar_nftables.sh)
# ------------------------------------------------------------
include /etc/squid/conf.d/gwos_tcp_outgoing.conf

# ------------------------------------------------------------
# Cache
# ------------------------------------------------------------
cache_mem 256 MB
maximum_object_size_in_memory 512 KB
maximum_object_size 64 MB
cache_dir ufs /var/spool/squid 4096 16 256
cache_replacement_policy heap LFUDA
memory_replacement_policy heap GDSF

no_cache deny CONNECT

# ------------------------------------------------------------
# Logs
# ------------------------------------------------------------
logformat gwos %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt

access_log /var/log/squid/access.log gwos
cache_log  /var/log/squid/cache.log
cache_store_log none
logfile_rotate 7

# ------------------------------------------------------------
# Erros personalizados
# ------------------------------------------------------------
error_directory /usr/share/squid/errors/pt-br
deny_info ERR_ACCESS_DENIED all
error_default_language pt-br

# ------------------------------------------------------------
# DNS — usa o BIND9 local (com RPZ) como resolver
# ------------------------------------------------------------
dns_nameservers 127.0.0.1
dns_defnames off

# ------------------------------------------------------------
# TLS session cache — desativado para evitar erro de SHM no Squid 6
# ------------------------------------------------------------
tls_session_cache_size 0

# ------------------------------------------------------------
# Performance
# ------------------------------------------------------------
visible_hostname gateway.local
forwarded_for delete
via off
client_lifetime 1 day
half_closed_clients off
connect_timeout 30 seconds
peer_connect_timeout 10 seconds
read_timeout 5 minutes
request_timeout 5 minutes
